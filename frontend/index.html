<!DOCTYPE html>
<html>

<head>
    <title>TARS RAG Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="chat-container">

<h2>TARS</h2>

<div class="chat-layout">

<!-- LEFT SIDE CHAT -->
<div class="chat-main">

<div id="chatbox"></div>

<div class="input-container">
<input id="userInput" placeholder="Ask something..." autofocus />
<button type="button" onclick="sendMessage()">Send</button>
</div>

</div>

<!-- RIGHT SIDE METRICS -->
<div class="metrics-panel">

<h3>Evaluation Metrics</h3>

<div class="metric-row">
<span>Faithfulness</span>
<span id="faithfulness">0</span>
</div>

<div class="metric-bar">
<div id="faithfulness-bar" class="metric-fill"></div>
</div>

<br>

<div class="metric-row">
<span>Answer Relevance</span>
<span id="relevance">0</span>
</div>

<div class="metric-bar">
<div id="relevance-bar" class="metric-fill"></div>
</div>

<br>

<div class="metric-row">
<span>Context Precision</span>
<span id="precision">0</span>
</div>

<div class="metric-bar">
<div id="precision-bar" class="metric-fill"></div>
</div>

<br>

<div class="metric-row">
<span>Context Recall</span>
<span id="recall">0</span>
</div>

<div class="metric-bar">
<div id="recall-bar" class="metric-fill"></div>
</div>

</div>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
